<!DOCTYPE html>
<html><head><title>Tax CPA AI</title></head><body style="font-family:sans-serif;margin:40px;">
<h1>TAXCPA.AI Test</h1>
<div id="chat" style="border:1px solid #ccc;padding:20px;height:300px;overflow:auto;"></div>
<input id="input" placeholder="Ask about taxes" style="width:70%;padding:10px;">
<button onclick="send()" style="padding:10px;">Send</button>
<script>
async function send(){
  const input = document.getElementById('input');
  const chat = document.getElementById('chat');
  const message = input.value;
  chat.innerHTML += `<p><b>You:</b> ${message}</p>`;
  input.value = '';
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message})
  });
  const data = await res.json();
  chat.innerHTML += `<p><b>AI:</b> ${data.response}</p>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
